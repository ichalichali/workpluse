services:
  - type: web
    name: workpulse
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: workpulse-db
          property: connectionString

databases:
  - name: workpulse-db
    databaseName: workpulse
    user: workpulse
